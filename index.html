<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Login Page</title>
<link rel="stylesheet" href="style.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
background:url("https://4kwallpapers.com/images/walls/thumbs_3t/11990.jpeg");
background-size:cover;

background-position:center;
}

/* Navbar */

nav{
display:flex;
justify-content:flex-end;
padding:20px 60px;
}

nav ul{
display:flex;
list-style:none;
gap:40px;
}

nav ul li a{
text-decoration:none;
color:black;
font-weight:bold;
}

/* Login container */

.login-container{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}

/* Glass login box */

.login-box{
width:750px;
padding:70px;
border-radius:25px;
background:rgba(0, 0, 0, 0.15);
backdrop-filter:blur(15px);
box-shadow:0 8px 32px rgba(0,0,0,0.3);
text-align:center;
}

.login-box h2{
margin-bottom:30px;
}

/* Input fields */

.input-box{
position:relative;
margin:20px 0;
}

.input-box input{
width:100%;
padding:10px;
border:none;
border-bottom:2px solid black;
background:transparent;
outline:none;
}

.input-box label{
position:absolute;
left:0;
top:-10px;
font-size:14px;
}

/* Remember + Forgot */

.options{
display:flex;
justify-content:space-between;
font-size:14px;
margin:15px 0;
}

/* Button */

button{
width:100%;
padding:10px;
border:none;
border-radius:5px;
background:linear-gradient(to right,#7ab6ff,#a7d1ff);
cursor:pointer;
margin-top:10px;
}

/* Register text */

p{
margin-top:20px;
font-size:14px;
}

p a{
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<nav>
<ul>
<li><a href="#">HOME</a></li>
<li><a href="#">ABOUT</a></li>
<li><a href="#">SERVICE</a></li>
<li><a href="#">CONTACT</a></li>
<li><a href="#">LOGIN</a></li>
</ul>
</nav>

<div class="login-container">

<div class="login-box">

<h2>LOGIN</h2>

<form>

<div class="input-box">
<input type="email" required>
<label>Email</label>
</div>

<div class="input-box">
<input type="password" required>
<label>Password</label>
</div>

<div class="options">

<label>
<input type="checkbox"> Remember Me
</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">Login</button>

<p>
Don't have an account?
<a href="#">Register</a>
</p>

</form>

</div>

</div>

</body>
</html>
